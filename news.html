<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>新闻 - DOSOI</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";background:#0b0f1a;color:#e5e7eb;}
header{padding:24px 40px;border-bottom:1px solid #1f2937;}
header a{color:#38bdf8;text-decoration:none;}
.container{max-width:960px;margin:32px auto;padding:0 24px;display:grid;grid-template-columns:1fr 1fr;gap:24px;}
textarea{height:480px;background:#111827;color:#e5e7eb;border:1px solid #374151;border-radius:8px;padding:16px;resize:vertical;}
.preview{background:#111827;border:1px solid #374151;border-radius:8px;padding:16px;overflow:auto;}
.toolbar button{background:#1f2937;color:#e5e7eb;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;}
.toolbar button:hover{background:#374151;}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header><a href="index.html">← DOSOI</a> / 新闻</header>

<div class="container">
  <div>
    <div class="toolbar" style="margin-bottom:8px;">
      <button onclick="insert('**','**')">加粗</button>
      <button onclick="insert('*','*')">斜体</button>
      <button onclick="insert('# ','')">标题</button>
      <button onclick="insert('- ','')">列表</button>
    </div>
    <textarea id="md"></textarea>
  </div>
  <div class="preview" id="preview"></div>
</div>

<script>
const md=document.getElementById("md");
const preview=document.getElementById("preview");
md.value=localStorage.getItem("dosoi_news")||"";
function insert(a,b){
  const s=md.selectionStart,e=md.selectionEnd;
  md.value=md.value.slice(0,s)+a+md.value.slice(s,e)+b;
  md.focus();
}
md.addEventListener("input",()=>{
  preview.innerHTML=marked.parse(md.value);
  localStorage.setItem("dosoi_news",md.value);
});
preview.innerHTML=marked.parse(md.value);
</script>

</body>
</html>
