<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>DOSOI</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sgoe UI,Roboto;
  background:#0b0f1a;
  color:#e5e7eb;
}
header{
  padding:24px 40px;
  border-bottom:1px solid #1f2937;
}
h1{
  font-size:28px;
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.subtitle{
  font-size:14px;
  color:#9ca3af;
  margin-top:4px;
}
.links{
  margin-top:12px;
}
.links a{
  color:#38bdf8;
  margin-right:16px;
  text-decoration:none;
  font-size:14px;
}
.links a:hover{
  text-decoration:underline;
}
main{
  max-width:960px;
  margin:32px auto;
  padding:0 24px;
}
textarea{
  width:100%;
  height:360px;
  background:#111827;
  color:#e5e7eb;
  border:1px solid #374151;
  border-radius:8px;
  padding:16px;
  font-size:14px;
  resize:vertical;
}
.preview{
  margin-top:24px;
  padding:20px;
  background:#111827;
  border-radius:8px;
  border:1px solid #374151;
}
nav{
  margin-top:32px;
  display:flex;
  gap:16px;
}
nav a{
  padding:10px 18px;
  background:#1f2937;
  border-radius:8px;
  color:#e5e7eb;
  text-decoration:none;
}
nav a:hover{
  background:#374151;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header>
  <h1>DOSOI</h1>
  <div class="subtitle">Dream On Sky</div>
  <div class="links">
    <!-- ↓↓↓ 友好链接自己写 ↓↓↓ -->
    <a href="#">友情链接1</a>
    <a href="#">友情链接2</a>
  </div>
</header>

<main>
  <h2>首页 Markdown 编辑区</h2>
  <textarea id="md" placeholder="在这里写 Markdown...">
# 欢迎来到 DOSOI

这里是首页内容。
  </textarea>

  <div class="preview" id="preview"></div>

  <nav>
    <a href="news.html">新闻</a>
    <a href="help.html">帮助中心</a>
    <a href="downloads.html">代码开源</a>
  </nav>
</main>

<script>
const md=document.getElementById("md");
const preview=document.getElementById("preview");
md.addEventListener("input",()=>{
  preview.innerHTML=marked.parse(md.value);
});
preview.innerHTML=marked.parse(md.value);
</script>

</body>
</html>
